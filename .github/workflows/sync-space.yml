name: sync-space

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-space-main
  cancel-in-progress: false

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full validation gate
        env:
          PYTHONUTF8: "1"
          PYTHONPATH: "."
        run: |
          pytest -q
          python verify_sre_bench.py

      - name: Ensure Hugging Face token is configured
        run: |
          if [ -z "${{ secrets.HF_SPACE_WRITE_TOKEN }}" ]; then
            echo "Missing required secret: HF_SPACE_WRITE_TOKEN"
            exit 1
          fi

      - name: Sync GitHub main to Hugging Face Space main
        env:
          HF_SPACE_WRITE_TOKEN: ${{ secrets.HF_SPACE_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote remove hf-space 2>/dev/null || true
          git remote add hf-space "https://x-access-token:${HF_SPACE_WRITE_TOKEN}@huggingface.co/spaces/santhakumar-k-2004/sre-bench"
          git fetch hf-space main || true

          expected=""
          if git rev-parse --verify refs/remotes/hf-space/main >/dev/null 2>&1; then
            expected="$(git rev-parse refs/remotes/hf-space/main)"
          fi

          if [ -n "$expected" ]; then
            git push --force-with-lease=refs/heads/main:${expected} hf-space HEAD:main
          else
            git push hf-space HEAD:main
          fi

      - name: Verify Space main reflects runtime hardening
        run: |
          python - <<'PY'
          import sys
          import httpx

          url = "https://huggingface.co/spaces/santhakumar-k-2004/sre-bench/raw/main/inference.py"
          response = httpx.get(url, timeout=30.0)
          response.raise_for_status()
          if "raise_for_status(" in response.text:
              print("Space inference.py still contains stale raise_for_status calls.")
              sys.exit(1)
          print("Space inference.py sync verification passed.")
          PY
