name: sync-space

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-space-main
  cancel-in-progress: false

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full validation gate
        env:
          PYTHONUTF8: "1"
          PYTHONPATH: "."
        run: |
          pytest -q
          python verify_sre_bench.py

      - name: Resolve Hugging Face write token
        env:
          HF_SPACE_WRITE_TOKEN: ${{ secrets.HF_SPACE_WRITE_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          token=""
          source_name=""
          if [ -n "${HF_SPACE_WRITE_TOKEN}" ]; then
            token="${HF_SPACE_WRITE_TOKEN}"
            source_name="HF_SPACE_WRITE_TOKEN"
          elif [ -n "${HF_TOKEN}" ]; then
            token="${HF_TOKEN}"
            source_name="HF_TOKEN"
          fi

          if [ -z "${token}" ]; then
            echo "Missing required secret: set HF_SPACE_WRITE_TOKEN (preferred) or HF_TOKEN."
            exit 1
          fi

          echo "::add-mask::${token}"
          echo "HF_SYNC_TOKEN=${token}" >> "${GITHUB_ENV}"
          echo "Using Hugging Face token from ${source_name}."

      - name: Sync GitHub main to Hugging Face Space main
        env:
          HF_SYNC_TOKEN: ${{ env.HF_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote remove hf-space 2>/dev/null || true
          git remote add hf-space "https://x-access-token:${HF_SYNC_TOKEN}@huggingface.co/spaces/santhakumar-k-2004/sre-bench"
          git fetch hf-space main || true

          expected=""
          if git rev-parse --verify refs/remotes/hf-space/main >/dev/null 2>&1; then
            expected="$(git rev-parse refs/remotes/hf-space/main)"
          fi

          if [ -n "$expected" ]; then
            git push --force-with-lease=refs/heads/main:${expected} hf-space HEAD:main
          else
            git push hf-space HEAD:main
          fi

      - name: Verify live Space release readiness
        env:
          PYTHONUTF8: "1"
          PYTHONPATH: "."
        run: |
          python check_space_release.py \
            --space-url https://santhakumar-k-2004-sre-bench.hf.space \
            --raw-url https://huggingface.co/spaces/santhakumar-k-2004/sre-bench/raw/main/inference.py
