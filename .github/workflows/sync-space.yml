name: sync-space

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-space-main
  cancel-in-progress: false

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest
    env:
      REQUIRE_SPACE_SYNC: ${{ vars.REQUIRE_SPACE_SYNC }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full validation gate
        env:
          PYTHONUTF8: "1"
          PYTHONPATH: "."
        run: |
          pytest -q
          python verify_sre_bench.py

      - name: Resolve Hugging Face write token
        env:
          HF_SPACE_WRITE_TOKEN: ${{ secrets.HF_SPACE_WRITE_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          token=""
          source_name=""
          strict_mode_raw="$(printf '%s' "${REQUIRE_SPACE_SYNC:-}" | tr '[:upper:]' '[:lower:]')"
          strict_mode="true"
          if [ "${strict_mode_raw}" = "false" ]; then
            strict_mode="false"
          fi

          if [ -n "${HF_SPACE_WRITE_TOKEN}" ]; then
            token="${HF_SPACE_WRITE_TOKEN}"
            source_name="HF_SPACE_WRITE_TOKEN"
          elif [ -n "${HF_TOKEN}" ]; then
            token="${HF_TOKEN}"
            source_name="HF_TOKEN"
          fi

          if [ -z "${token}" ]; then
            if [ "${strict_mode}" = "true" ]; then
              echo "SYNC_ENABLED=false" >> "${GITHUB_ENV}"
              echo "::error::Space sync is required by default but no Hugging Face write token is configured. Set HF_SPACE_WRITE_TOKEN (preferred) or HF_TOKEN, or explicitly set REQUIRE_SPACE_SYNC=false to opt out."
              exit 1
            fi

            echo "SYNC_ENABLED=false" >> "${GITHUB_ENV}"
            echo "::warning::Missing Hugging Face write token. Automatic Space sync is disabled because REQUIRE_SPACE_SYNC=false was set explicitly."
            exit 0
          fi

          echo "::add-mask::${token}"
          echo "HF_SYNC_TOKEN=${token}" >> "${GITHUB_ENV}"
          echo "SYNC_ENABLED=true" >> "${GITHUB_ENV}"
          echo "Using Hugging Face token from ${source_name}."

      - name: Skip notice when sync token is unavailable
        if: env.SYNC_ENABLED != 'true'
        run: |
          echo "Space sync skipped because no Hugging Face write token secret is configured."

      - name: Sync GitHub main to Hugging Face Space main
        if: env.SYNC_ENABLED == 'true'
        env:
          HF_SYNC_TOKEN: ${{ env.HF_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote remove hf-space 2>/dev/null || true
          repo_path="spaces/santhakumar-k-2004/sre-bench"
          base_host="huggingface.co"
          selected_url=""

          for candidate in \
            "https://santhakumar-k-2004:${HF_SYNC_TOKEN}@${base_host}/${repo_path}" \
            "https://user:${HF_SYNC_TOKEN}@${base_host}/${repo_path}" \
            "https://x-access-token:${HF_SYNC_TOKEN}@${base_host}/${repo_path}"; do
            if git ls-remote "${candidate}" >/dev/null 2>&1; then
              selected_url="${candidate}"
              break
            fi
          done

          if [ -z "${selected_url}" ]; then
            echo "::error::Unable to authenticate to Hugging Face Space git remote with the configured token."
            exit 1
          fi

          git remote add hf-space "${selected_url}"
          git fetch hf-space main || true

          # Keep Space main aligned with GitHub main even if histories diverge.
          git push --force hf-space HEAD:main

      - name: Verify live Space release readiness
        if: env.SYNC_ENABLED == 'true'
        env:
          PYTHONUTF8: "1"
          PYTHONPATH: "."
        run: |
          python check_space_release.py \
            --space-url https://santhakumar-k-2004-sre-bench.hf.space \
            --raw-url https://huggingface.co/spaces/santhakumar-k-2004/sre-bench/raw/main/inference.py
